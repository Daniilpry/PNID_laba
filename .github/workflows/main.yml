name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Лапки обов'язкові, щоб 3.10 не перетворилося на 3.1
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-html
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # Зупинка збірки, якщо є синтаксичні помилки
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run Tests
      run: |
        # Додаємо поточну директорію в шлях, щоб pytest бачив модуль 'app'
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest tests/ --html=report.html --self-contained-html

    - name: Upload report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: report-python-${{ matrix.python-version }}
        path: report.html

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t my-app-image .